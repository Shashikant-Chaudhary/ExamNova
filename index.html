<!doctype html>
<html lang="en">
  <head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <link rel="apple-touch-icon" href="/icon-512.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#f97316" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ExamNova" />
  <title>ExamNova</title>
  <style>
    #splash {
      position: fixed;
      inset: 0;
      background: #0f1f3d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #splash.hide {
      opacity: 0;
      visibility: hidden;
    }
    .splash-logo {
      animation: splashPop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
      opacity: 0;
    }
    .splash-name {
      margin-top: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      animation: splashFade 0.5s ease 0.4s forwards;
      opacity: 0;
    }
    .splash-name span { color: #f97316; }
    .splash-tagline {
      margin-top: 8px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: splashFade 0.5s ease 0.6s forwards;
      opacity: 0;
    }
    .splash-dots {
      display: flex;
      gap: 7px;
      margin-top: 48px;
      animation: splashFade 0.5s ease 0.8s forwards;
      opacity: 0;
    }
    .splash-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #f97316;
      animation: dotBounce 1.2s ease-in-out infinite;
    }
    .splash-dots span:nth-child(2) { animation-delay: 0.18s; background: rgba(249,115,22,0.6); }
    .splash-dots span:nth-child(3) { animation-delay: 0.36s; background: rgba(249,115,22,0.3); }

    @keyframes splashPop {
      0%   { opacity: 0; transform: scale(0.5) rotate(-10deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    @keyframes splashFade {
      to { opacity: 1; }
    }
    @keyframes dotBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }
  </style>
</head>
  <body>
    <!-- Animated splash screen -->
    <div id="splash">
      <div class="splash-logo">
        <svg width="80" height="80" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
          <rect width="100" height="100" rx="22" fill="#1a3360"/>
          <path d="M28,72 L28,28 L50,60 L72,28 L72,72"
            fill="none" stroke="white" stroke-width="10"
            stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="72" cy="28" r="7" fill="#f97316"/>
        </svg>
      </div>
      <div class="splash-name">Exam<span>Nova</span></div>
      <div class="splash-tagline">Govt Exam Prep</div>
      <div class="splash-dots">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Hide splash once React has mounted
      window.__hideSplash = function() {
        var s = document.getElementById('splash');
        if (s) {
          s.classList.add('hide');
          setTimeout(function(){ s.remove(); }, 500);
        }
      };
      // Fallback: hide after 4s even if React is slow
      setTimeout(window.__hideSplash, 4000);
    </script>
  </body>
</html>
